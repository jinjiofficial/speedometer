<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Cyber Speedometer - RAW</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-white: rgba(255, 255, 255, 0.9);
            --neon-glow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            background-color: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        #gauge-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #track {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-sizing: border-box;
        }

        #needle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* 보정을 뺐으니 반응 속도를 더 빠르게(0.1s) 설정 */
            transition: transform 0.1s linear;
            z-index: 2;
        }

        #needle::after {
            content: '';
            position: absolute;
            top: -6px;
            left: calc(50% - 2px);
            width: 4px;
            height: 12px;
            background-color: white;
            box-shadow: var(--neon-glow);
            border-radius: 2px;
        }

        #display {
            text-align: center;
            z-index: 3;
        }

        #speed {
            font-size: 90px;
            font-weight: 700;
            text-shadow: var(--neon-glow);
            margin: 0;
        }

        .unit {
            font-size: 16px;
            opacity: 0.5;
            letter-spacing: 3px;
        }

        #status {
            margin-top: 40px;
            font-size: 10px;
            letter-spacing: 2px;
            color: #444;
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: white;
            border: 1px solid white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="gauge-container">
        <div id="track"></div>
        <div id="needle"></div>
        <div id="display">
            <p id="speed">0</p>
            <span class="unit">KM/H</span>
        </div>
    </div>

    <div id="status">RAW DATA MODE</div>
    <button id="start-btn">IGNITION</button>

    <script>
        const speedEl = document.getElementById('speed');
        const needleEl = document.getElementById('needle');
        const startBtn = document.getElementById('start-btn');

        let rawSpeed = 0;
        let lastTime = Date.now();

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const permission = await DeviceMotionEvent.requestPermission();
                if (permission === 'granted') window.addEventListener('devicemotion', handleMotion);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }
        });

        function handleMotion(event) {
            const acc = event.acceleration;
            if (!acc || acc.x === null) return;

            const now = Date.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            // 가속도 벡터 합성
            const accMag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);

            // 보정 없이 그대로 적분 (v = v + a*t)
            // 흔드는 맛을 위해 가중치를 조금 높였어!
            if (accMag > 0.3) {
                rawSpeed += (accMag * dt) * 2.0; 
            }

            // 마찰력 효과 (가만히 두면 속도가 서서히 줄어듦)
            rawSpeed *= 0.98;

            updateUI(rawSpeed);
        }

        function updateUI(s) {
            let kmh = s * 3.6;
            if (kmh < 0.1) kmh = 0;
            
            // 화면 표시
            speedEl.innerText = Math.floor(kmh);

            // 바늘 회전 (0~200km/h 기준, -120도에서 120도까지)
            const maxDisplay = 200;
            const angle = (Math.min(kmh, maxDisplay) / maxDisplay) * 240 - 120;
            needleEl.style.transform = `rotate(${angle}deg)`;
        }
    </script>
</body>
</html>
