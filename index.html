<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio J - Hybrid Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-white: rgba(255, 255, 255, 0.9); --neon-glow: 0 0 15px rgba(255, 255, 255, 0.6); }
        body { margin: 0; background-color: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        /* 모드 선택기 스타일 업데이트 */
        .mode-selector { margin-bottom: 25px; display: flex; background: rgba(255,255,255,0.05); border-radius: 30px; padding: 5px; border: 1px solid rgba(255,255,255,0.1); }
        .mode-btn { padding: 10px 25px; background: transparent; color: rgba(255,255,255,0.4); border: none; cursor: pointer; font-family: 'Orbitron'; font-size: 13px; transition: 0.3s; border-radius: 25px; }
        .mode-btn.active { background: white; color: black; font-weight: 700; box-shadow: var(--neon-glow); }

        #gauge-container { position: relative; width: 350px; height: 350px; display: flex; align-items: center; justify-content: center; }
        #face-container { position: absolute; width: 100%; height: 100%; }
        .tick { position: absolute; top: 0; left: calc(50% - 1px); width: 2px; height: 10px; background-color: rgba(255, 255, 255, 0.2); transform-origin: 0 175px; }
        .tick.major { height: 18px; width: 3px; background-color: white; box-shadow: var(--neon-glow); }
        .label { position: absolute; width: 40px; text-align: center; font-size: 14px; color: rgba(255, 255, 255, 0.7); transform: translate(-50%, -50%); }
        
        #needle-container { position: absolute; width: 100%; height: 100%; transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        #needle { position: absolute; top: 20px; left: calc(50% - 2px); width: 4px; height: 65px; background: linear-gradient(to bottom, white, transparent); box-shadow: var(--neon-glow); border-radius: 2px; }
        
        #display { text-align: center; margin-top: 50px; }
        #speed { font-size: 85px; font-weight: 700; text-shadow: var(--neon-glow); margin: 0; line-height: 1; }
        .unit { font-size: 14px; opacity: 0.5; letter-spacing: 3px; display: block; margin-top: 5px; }

        .controls { margin-top: 40px; }
        .main-btn { padding: 12px 35px; background: transparent; color: white; border: 1px solid white; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }
        .main-btn:hover { background: rgba(255,255,255,0.1); }
        .active-sound { background: white !important; color: black !important; box-shadow: var(--neon-glow); }
    </style>
</head>
<body>

    <div class="mode-selector">
        <button id="shake-btn" class="mode-btn active">SHAKE ENGINE</button>
        <button id="drive-btn" class="mode-btn">DRIVE ENGINE</button>
    </div>

    <div id="gauge-container">
        <div id="face-container"></div>
        <div id="needle-container"><div id="needle"></div></div>
        <div id="display">
            <p id="speed">0</p>
            <span class="unit">KM/H</span>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn" class="main-btn">IGNITION</button>
        <button id="sound-btn" class="main-btn" style="display: none;">SOUND OFF</button>
    </div>

    <audio id="ev-audio" loop preload="auto"><source src="ev_sound.mp3" type="audio/mpeg"></audio>

    <script>
        const speedEl = document.getElementById('speed');
        const needleContainer = document.getElementById('needle-container');
        const evAudio = document.getElementById('ev-audio');
        
        // 데이터 저장소 (엔진 분리)
        let engines = {
            SHAKE: 0,
            DRIVE: 0
        };
        let currentMode = 'SHAKE';
        let isSoundOn = false;
        const maxSpeed = 200, startAngle = -120, endAngle = 120;

        // 1. 배경 눈금 생성
        const face = document.getElementById('face-container');
        for (let s = 0; s <= maxSpeed; s += 5) {
            const angle = ((s / maxSpeed) * (endAngle - startAngle)) + startAngle;
            const tick = document.createElement('div');
            tick.className = s % 20 === 0 ? 'tick major' : 'tick';
            tick.style.transform = `rotate(${angle}deg)`;
            face.appendChild(tick);
            if (s % 40 === 0) {
                const label = document.createElement('div');
                label.className = 'label';
                const rad = (angle - 90) * (Math.PI / 180);
                label.style.left = `${175 + 135 * Math.cos(rad)}px`;
                label.style.top = `${175 + 135 * Math.sin(rad)}px`;
                label.innerText = s;
                face.appendChild(label);
            }
        }

        // 2. 엔진 전환 로직
        document.getElementById('shake-btn').onclick = function() {
            currentMode = 'SHAKE';
            this.classList.add('active');
            document.getElementById('drive-btn').classList.remove('active');
        };
        document.getElementById('drive-btn').onclick = function() {
            currentMode = 'DRIVE';
            this.classList.add('active');
            document.getElementById('shake-btn').classList.remove('active');
        };

        // 3. 메인 시스템 시작
        document.getElementById('start-btn').onclick = async function() {
            this.style.display = 'none';
            document.getElementById('sound-btn').style.display = 'block';
            evAudio.play().then(() => { evAudio.volume = 0; });

            // [SHAKE 엔진 가동]
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                await DeviceMotionEvent.requestPermission();
            }
            let lastTime = Date.now();
            window.addEventListener('devicemotion', (e) => {
                const acc = e.acceleration;
                if (!acc || acc.x === null) return;
                const dt = (Date.now() - lastTime) / 1000;
                lastTime = Date.now();
                const accMag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                if (accMag > 0.4) engines.SHAKE += (accMag * dt) * 2.5;
                engines.SHAKE *= 0.97; // 자연 감속
                if(currentMode === 'SHAKE') updateDisplay(engines.SHAKE * 3.6);
            });

            // [DRIVE 엔진 가동]
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((pos) => {
                    engines.DRIVE = (pos.coords.speed || 0) * 3.6;
                    if(currentMode === 'DRIVE') updateDisplay(engines.DRIVE);
                }, null, { enableHighAccuracy: true });
            }

            // 사운드/UI 업데이트 루프 (프리즈 방지)
            setInterval(() => {
                const targetSpeed = currentMode === 'SHAKE' ? engines.SHAKE * 3.6 : engines.DRIVE;
                updateDisplay(targetSpeed);
            }, 100);
        };

        document.getElementById('sound-btn').onclick = function() {
            isSoundOn = !isSoundOn;
            this.innerText = isSoundOn ? "SOUND ON" : "SOUND OFF";
            this.classList.toggle('active-sound');
            if (!isSoundOn) evAudio.volume = 0;
        };

        function updateDisplay(kmh) {
            const val = Math.min(Math.max(kmh, 0), maxSpeed);
            speedEl.innerText = Math.floor(val);
            const angle = ((val / maxSpeed) * (endAngle - startAngle)) + startAngle;
            needleContainer.style.transform = `rotate(${angle}deg)`;
            
            if (isSoundOn) {
                evAudio.playbackRate = Math.min(0.8 + (val / 60), 3.5);
                evAudio.volume = Math.min(0.6, 0.1 + (val / 150));
            }
        }
    </script>
</body>
</html>
