<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio J - Neon Speedometer (Sound Update)</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-white: rgba(255, 255, 255, 0.9);
            --neon-glow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            background-color: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        /* 계기판 컨테이너 */
        #gauge-container {
            position: relative;
            width: 350px;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #face-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .tick {
            position: absolute;
            top: 0;
            left: calc(50% - 1px);
            width: 2px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.3);
            transform-origin: 0 175px;
        }

        .tick.major {
            height: 20px;
            width: 3px;
            background-color: white;
            box-shadow: var(--neon-glow);
        }

        .label {
            position: absolute;
            width: 40px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            transform: translate(-50%, -50%);
        }

        #needle-container {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: transform 0.1s linear;
            z-index: 10;
        }

        #needle {
            position: absolute;
            top: 20px;
            left: calc(50% - 2px);
            width: 4px;
            height: 65px;
            background: linear-gradient(to bottom, white, rgba(255,255,255,0));
            box-shadow: var(--neon-glow);
            border-radius: 2px;
        }

        #display {
            text-align: center;
            margin-top: 50px;
        }

        #speed {
            font-size: 75px;
            text-shadow: var(--neon-glow);
            margin: 0;
        }

        .unit {
            font-size: 14px;
            opacity: 0.5;
            letter-spacing: 2px;
        }

        /* 제어 버튼 영역 */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            flex-direction: column;
            align-items: center;
        }

        button {
            padding: 10px 25px;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        button.active {
            background: white;
            color: black;
            box-shadow: var(--neon-glow);
        }
    </style>
</head>
<body>

    <div id="gauge-container">
        <div id="face-container"></div>
        <div id="needle-container">
            <div id="needle"></div>
        </div>
        <div id="display">
            <p id="speed">0</p>
            <span class="unit">KM/H</span>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn">IGNITION (START)</button>
        <button id="sound-btn" style="display: none;">SOUND OFF</button>
    </div>

    <script>
        const face = document.getElementById('face-container');
        const speedEl = document.getElementById('speed');
        const needleContainer = document.getElementById('needle-container');
        const startBtn = document.getElementById('start-btn');
        const soundBtn = document.getElementById('sound-btn');

        const startAngle = -120;
        const endAngle = 120;
        const maxSpeed = 200;

        // 눈금 및 숫자 라벨 생성
        for (let s = 0; s <= maxSpeed; s += 5) {
            const angle = ((s / maxSpeed) * (endAngle - startAngle)) + startAngle;
            const tick = document.createElement('div');
            tick.className = s % 20 === 0 ? 'tick major' : 'tick';
            tick.style.transform = `rotate(${angle}deg)`;
            face.appendChild(tick);

            if (s % 40 === 0) {
                const label = document.createElement('div');
                label.className = 'label';
                const radius = 135;
                const rad = (angle - 90) * (Math.PI / 180);
                const x = 175 + radius * Math.cos(rad);
                const y = 175 + radius * Math.sin(rad);
                label.style.left = `${x}px`;
                label.style.top = `${y}px`;
                label.innerText = s;
                face.appendChild(label);
            }
        }

        needleContainer.style.transform = `rotate(${startAngle}deg)`;

        // --- 사운드 엔진 설정 ---
        let audioCtx, oscillator, gainNode;
        let isSoundOn = false;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            
            oscillator.type = 'sawtooth'; // 사이버틱한 톱니파 소리
            oscillator.frequency.setValueAtTime(50, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        function updateSound(kmh) {
            if (!audioCtx || !isSoundOn) return;
            // 속도에 따라 주파수 조절 (50Hz ~ 400Hz)
            const freq = 50 + (kmh * 1.5);
            oscillator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
            // 속도가 빠를수록 소리도 살짝 커짐
            const vol = kmh > 1 ? 0.1 + (kmh / 400) : 0;
            gainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
        }

        // --- 센서 및 이벤트 제어 ---
        let rawSpeed = 0;
        let lastTime = Date.now();

        startBtn.addEventListener('click', async () => {
            if (!audioCtx) initAudio();
            startBtn.style.display = 'none';
            soundBtn.style.display = 'block';
            
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const res = await DeviceMotionEvent.requestPermission();
                if (res === 'granted') window.addEventListener('devicemotion', handleMotion);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }
        });

        soundBtn.addEventListener('click', () => {
            isSoundOn = !isSoundOn;
            soundBtn.innerText = isSoundOn ? "SOUND ON" : "SOUND OFF";
            soundBtn.classList.toggle('active');
            if (!isSoundOn && gainNode) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        });

        function handleMotion(event) {
            const acc = event.acceleration;
            if (!acc || acc.x === null) return;

            const now = Date.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            const accMag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);

            if (accMag > 0.4) {
                rawSpeed += (accMag * dt) * 2.5;
            }
            rawSpeed *= 0.97;

            updateUI(rawSpeed);
            updateSound(rawSpeed * 3.6);
        }

        function updateUI(s) {
            let kmh = s * 3.6;
            if (kmh < 0.1) kmh = 0;
            if (kmh > maxSpeed) kmh = maxSpeed;

            speedEl.innerText = Math.floor(kmh);
            const angle = ((kmh / maxSpeed) * (endAngle - startAngle)) + startAngle;
            needleContainer.style.transform = `rotate(${angle}deg)`;
        }
    </script>
</body>
</html>
