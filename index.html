<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio J - Full Speedometer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-white: rgba(255, 255, 255, 0.9);
            --neon-glow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            background-color: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        #gauge-container {
            position: relative;
            width: 350px;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 눈금 및 숫자 컨테이너 */
        #face-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .tick {
            position: absolute;
            top: 0;
            left: calc(50% - 1px);
            width: 2px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.3);
            transform-origin: 0 175px; /* 반지름 175px 기준으로 회전 */
        }

        .tick.major {
            height: 20px;
            width: 3px;
            background-color: white;
            box-shadow: var(--neon-glow);
        }

        /* 숫자 라벨 스타일 */
        .label {
            position: absolute;
            width: 40px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            transform: translate(-50%, -50%);
        }

        /* 바늘 컨테이너 */
        #needle-container {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: transform 0.1s linear;
            z-index: 10;
        }

        #needle {
            position: absolute;
            top: 20px; /* 눈금 안쪽으로 살짝 들어오게 */
            left: calc(50% - 2px);
            width: 4px;
            height: 60px; /* 바늘 길이를 시원하게 늘림 */
            background: linear-gradient(to bottom, white, rgba(255,255,255,0));
            box-shadow: var(--neon-glow);
            border-radius: 2px;
        }

        #display {
            text-align: center;
            margin-top: 40px; /* 숫자를 아래쪽으로 살짝 내림 */
        }

        #speed {
            font-size: 70px;
            text-shadow: var(--neon-glow);
            margin: 0;
        }

        .unit {
            font-size: 14px;
            opacity: 0.5;
            letter-spacing: 2px;
        }

        button {
            margin-top: 30px;
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            cursor: pointer;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="gauge-container">
        <div id="face-container"></div>
        <div id="needle-container">
            <div id="needle"></div>
        </div>
        <div id="display">
            <p id="speed">0</p>
            <span class="unit">KM/H</span>
        </div>
    </div>

    <button id="start-btn">IGNITION</button>

    <script>
        const face = document.getElementById('face-container');
        const speedEl = document.getElementById('speed');
        const needleContainer = document.getElementById('needle-container');
        const startBtn = document.getElementById('start-btn');

        // 눈금 및 숫자 생성 로직
        const startAngle = -120; // 0km/h 위치
        const endAngle = 120;   // 200km/h 위치
        const maxSpeed = 200;

        // 1. 눈금 그리기 (5km 단위로 40개)
        for (let s = 0; s <= maxSpeed; s += 5) {
            const angle = ((s / maxSpeed) * (endAngle - startAngle)) + startAngle;
            const tick = document.createElement('div');
            tick.className = s % 20 === 0 ? 'tick major' : 'tick';
            tick.style.transform = `rotate(${angle}deg)`;
            face.appendChild(tick);

            // 2. 숫자 라벨 달기 (40 단위)
            if (s % 40 === 0) {
                const label = document.createElement('div');
                label.className = 'label';
                const radius = 135; // 숫자가 배치될 반지름
                const rad = (angle - 90) * (Math.PI / 180); // 각도를 라디안으로
                
                const x = 175 + radius * Math.cos(rad);
                const y = 175 + radius * Math.sin(rad);
                
                label.style.left = `${x}px`;
                label.style.top = `${y}px`;
                label.innerText = s;
                face.appendChild(label);
            }
        }

        // 초기 바늘 위치
        needleContainer.style.transform = `rotate(${startAngle}deg)`;

        // 센서 로직 (RAW 모드)
        let rawSpeed = 0;
        let lastTime = Date.now();

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const res = await DeviceMotionEvent.requestPermission();
                if (res === 'granted') window.addEventListener('devicemotion', handleMotion);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }
        });

        function handleMotion(event) {
            const acc = event.acceleration;
            if (!acc || acc.x === null) return;

            const now = Date.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            const accMag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);

            if (accMag > 0.4) {
                rawSpeed += (accMag * dt) * 2.5; // 흔드는 맛을 위해 가중치 살짝 UP
            }
            rawSpeed *= 0.97; // 자연스럽게 감속

            updateUI(rawSpeed);
        }

        function updateUI(s) {
            let kmh = s * 3.6;
            if (kmh < 0) kmh = 0;
            if (kmh > maxSpeed) kmh = maxSpeed;

            speedEl.innerText = Math.floor(kmh);
            const angle = ((kmh / maxSpeed) * (endAngle - startAngle)) + startAngle;
            needleContainer.style.transform = `rotate(${angle}deg)`;
        }
    </script>
</body>
</html>
